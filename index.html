<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>скрыватель ссылок</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, sans-serif;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      flex-direction: column;
    }
    .bg-hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .heart { position: absolute; color: #e2e8f0; opacity: 0.6; user-select: none; }
    .heart i { font-size: 18vw; display: block; }
    .heart-1 { bottom: -4vw; right: -6vw; transform: rotate(15deg); color: #d9e2ef; }
    .heart-2 { top: -2vw; left: -3vw; transform: rotate(-10deg); color: #e9eef4; }
    .heart-3 { top: 40vh; left: 65vw; transform: rotate(25deg); opacity: 0.35; color: #cbd5e1; }
    .card {
      position: relative; z-index: 10; max-width: 540px; width: 100%;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 44px;
      padding: 36px 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 0.5px rgba(0, 0, 0, 0.03) inset;
      transition: transform 0.3s ease; animation: appear 0.5s ease-out;
    }
    @keyframes appear { 0% { opacity: 0; transform: translateY(18px); } 100% { opacity: 1; transform: translateY(0); } }
    h1 { font-size: 2.2rem; font-weight: 600; letter-spacing: -0.02em; color: #0b1e33; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .sub { color: #475569; font-weight: 450; margin-bottom: 32px; font-size: 0.98rem; border-bottom: 1px solid #dce3ec; padding-bottom: 18px; }
    .section { margin-bottom: 24px; }
    label { display: block; font-size: 0.95rem; font-weight: 500; margin-bottom: 8px; color: #1e293b; }
    input {
      width: 100%; padding: 16px 20px; background: #ffffffd6; border: 1.5px solid #cfdde9;
      border-radius: 36px; font-size: 1rem; color: #0f172a; outline: none;
      transition: border 0.2s, box-shadow 0.2s; font-family: inherit; backdrop-filter: blur(4px);
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px #bfdbfe; background: white; }
    input::placeholder { color: #8596a9; font-weight: 350; }
    .btn {
      background: #ffffffd0; border: 1.5px solid #b9c9da; color: #1e293b; padding: 14px 24px;
      font-size: 1.05rem; font-weight: 590; border-radius: 44px; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 4px 8px -4px rgba(0,0,0,0.05); width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px; backdrop-filter: blur(8px);
    }
    .btn-primary { background: #1a2e4f; border-color: #1a2e4f; color: white; box-shadow: 0 10px 18px -8px #0f1e2f60; }
    .btn-primary:hover:not(:disabled) { background: #243b58; transform: translateY(-2px); box-shadow: 0 16px 24px -10px #0f1e2f; }
    .btn:disabled { opacity: 0.45; cursor: default; box-shadow: none; }
    .result-panel {
      margin-top: 24px; background: #eef2f6b0; border-radius: 32px; padding: 18px 20px;
      backdrop-filter: blur(4px); border: 1px solid #ffffff;
    }
    .short-url {
      font-family: 'SF Mono', monospace; color: #075985; word-break: break-all;
      margin-bottom: 16px; font-size: 0.95rem; padding-bottom: 10px; border-bottom: 1px dashed #94a3b8;
    }
    .copy-row { display: flex; gap: 12px; }
    .btn-outline { background: transparent; border: 1.5px solid #2563eb; color: #1e3a8a; width: auto; flex: 1; box-shadow: none; }
    .btn-outline:hover { background: #dbeafe; }
    .captcha-container { text-align: center; }
    .hint {
      background: #e6edf6; padding: 12px 20px; border-radius: 60px; display: inline-block;
      color: #1e293b; font-weight: 500; margin-bottom: 24px; border: 1px solid #cbd5e1;
    }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 300px; margin: 20px auto; }
    .cell {
      aspect-ratio: 1/1; border-radius: 20px; cursor: pointer; transition: 0.15s;
      background: #cbd5e1; box-shadow: 0 6px 0 #94a3b8, 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
    }
    .cell.green { background: #10b981; box-shadow: 0 6px 0 #047857, 0 0 0 2px #a7f3d0; }
    .cell.red { background: #b91c1c; box-shadow: 0 6px 0 #7f1d1d; }
    .cell.selected { background: #2563eb !important; box-shadow: 0 4px 0 #1e40af, 0 0 0 3px #93c5fd; transform: scale(0.96); }
    .error-msg { min-height: 28px; color: #b91c1c; font-weight: 500; margin: 12px 0; }
    .hidden { display: none !important; }
    .footer-note { margin-top: 24px; text-align: center; }
    .footer-note a { color: #2563eb; text-decoration: none; font-weight: 500; border-bottom: 1px dotted #60a5fa; }
    i { font-size: 1.25rem; vertical-align: middle; }
    .flex { display: flex; align-items: center; }

    .credit {
      position: relative;
      z-index: 10;
      margin-top: 20px;
      text-align: center;
      font-family: 'SF Pro Display', -apple-system, Helvetica, sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      color: #3a4c62;
      opacity: 0.75;
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 40px;
      background: rgba(255,255,255,0.3);
      display: inline-block;
      border: 0.5px solid rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
<div class="bg-hearts">
  <div class="heart heart-1"><i class="ri-heart-3-fill"></i></div>
  <div class="heart heart-2"><i class="ri-heart-3-fill"></i></div>
  <div class="heart heart-3"><i class="ri-heart-3-fill"></i></div>
</div>
<div class="card">
  <h1><i class="ri-eye-off-line" style="font-size: 1.8rem; color: #2563eb;"></i>Скрыватель</h1>
  <div class="sub">ссылка с простой капчей · без сервера</div>
  <div id="generatorBlock">
    <div class="section">
      <label>Длинная ссылка</label>
      <input type="url" id="longUrl" placeholder="https://…" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="generateBtn"><i class="ri-lock-2-line"></i> Скрыть</button>
    <div id="resultBlock" class="result-panel hidden">
      <div class="short-url" id="shortUrlDisplay"></div>
      <div class="copy-row">
        <button class="btn btn-outline" id="copyBtn"><i class="ri-file-copy-line"></i> Копировать</button>
        <span class="flex" style="margin-left: auto; gap: 4px; color: #0d9488;"><i class="ri-check-line"></i>готово</span>
      </div>
    </div>
    <div class="footer-note" style="color:#64748b;"><i class="ri-shield-check-line"></i> защита 3×3</div>
  </div>
  <div id="captchaBlock" class="hidden">
    <div class="captcha-container">
      <div class="hint"><i class="ri-focus-3-line" style="margin-right: 6px;"></i>нажмите на зелёные квадраты</div>
      <div id="captchaGrid" class="grid"></div>
      <button class="btn btn-primary" id="submitCaptchaBtn" disabled><i class="ri-check-line"></i> Подтвердить</button>
      <div id="captchaError" class="error-msg"></div>
    </div>
    <div class="footer-note"><a href="./"><i class="ri-arrow-left-line"></i> назад к генератору</a></div>
  </div>
</div>
<div class="credit">Made by Type | codeplen.ru</div>
<script>
  (function(){
    const p = new URLSearchParams(location.search);
    const go = p.get('go');
    const genBlock = document.getElementById('generatorBlock');
    const capBlock = document.getElementById('captchaBlock');
    const urlInput = document.getElementById('longUrl');
    const genBtn = document.getElementById('generateBtn');
    const resBlock = document.getElementById('resultBlock');
    const shortSpan = document.getElementById('shortUrlDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const gridEl = document.getElementById('captchaGrid');
    const submitBtn = document.getElementById('submitCaptchaBtn');
    const errEl = document.getElementById('captchaError');
    let correct = new Set();
    let selected = new Set();
    let target = '';
    const encode = (u) => btoa(encodeURIComponent(u));
    const decode = (e) => decodeURIComponent(atob(e));
    if (go) {
      genBlock.classList.add('hidden');
      capBlock.classList.remove('hidden');
      try {
        target = decode(go);
        if (!/^https?:\/\//i.test(target)) throw new Error();
      } catch (e) {
        errEl.textContent = 'неверная ссылка';
        submitBtn.disabled = true;
        return;
      }
      initCaptcha();
    } else {
      genBlock.classList.remove('hidden');
      capBlock.classList.add('hidden');
    }
    function initCaptcha() {
      correct.clear(); selected.clear(); submitBtn.disabled = true; errEl.textContent = '';
      const arr = [0,1,2,3,4,5,6,7,8];
      for (let i=arr.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      for (let i=0; i<3; i++) correct.add(arr[i]);
      renderGrid();
    }
    function renderGrid() {
      gridEl.innerHTML = '';
      for (let i=0; i<9; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        if (correct.has(i)) c.classList.add('green');
        else c.classList.add('red');
        if (selected.has(i)) c.classList.add('selected');
        c.dataset.idx = i;
        c.addEventListener('click', (e) => toggleCell(i, c));
        gridEl.appendChild(c);
      }
    }
    function toggleCell(idx, el) {
      if (!correct.has(idx)) {
        el.style.transform = 'scale(0.94)';
        setTimeout(()=> el.style.transform='', 120);
        errEl.textContent = 'нажимайте только на зелёные';
        return;
      }
      if (selected.has(idx)) { selected.delete(idx); el.classList.remove('selected'); }
      else { selected.add(idx); el.classList.add('selected'); }
      errEl.textContent = '';
      const allOk = correct.size === selected.size && [...correct].every(v=>selected.has(v));
      submitBtn.disabled = !allOk;
    }
    submitBtn.addEventListener('click', ()=>{
      if (submitBtn.disabled || !target) return;
      if (correct.size !== selected.size) return;
      location.href = target;
    });
    genBtn.addEventListener('click', ()=>{
      let raw = urlInput.value.trim();
      if (!raw) { alert('введите ссылку'); return; }
      if (!/^https?:\/\//i.test(raw)) raw = 'https://'+raw;
      try { new URL(raw); } catch(e) { alert('некорректный url'); return; }
      const enc = encode(raw);
      const base = location.origin + location.pathname;
      const link = `${base}?go=${enc}`;
      shortSpan.textContent = link;
      resBlock.classList.remove('hidden');
      navigator.clipboard?.writeText(link);
    });
    copyBtn.addEventListener('click', async ()=>{
      const t = shortSpan.textContent;
      if (!t) return;
      try {
        await navigator.clipboard.writeText(t);
        copyBtn.innerHTML = '<i class="ri-check-line"></i> Скопировано';
        setTimeout(()=> copyBtn.innerHTML = '<i class="ri-file-copy-line"></i> Копировать', 1700);
      } catch {
        const ta = document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        copyBtn.innerHTML = '<i class="ri-check-line"></i> Скопировано';
        setTimeout(()=> copyBtn.innerHTML = '<i class="ri-file-copy-line"></i> Копировать', 1700);
      }
    });
    urlInput.addEventListener('keypress', e=> { if(e.key==='Enter') genBtn.click(); });
  })();
</script>
</body>
</html>
